enuiserie.ma<\u002Fspan>\n    <span>Présentation commerciale<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 2 — POURQUOI HISMAR ════ -->\n<section class=\"page cream\" data-screen-label=\"02 Pourquoi Hismar\" id=\"pourquoi\">\n  <div class=\"page-head\"><span class=\"logo-sm\">HISMAR<\u002Fspan><span class=\"meta\">02 — Pourquoi Hismar<\u002Fspan><\u002Fdiv>\n  <div class=\"body-pad\" style=\"padding-top:54px;\">\n    <span class=\"eyebrow\">Pourquoi Hismar<\u002Fspan>\n    <h2 style=\"margin-top:16px;max-width:540px;\">58 ans d’excellence industrielle<\u002Fh2>\n    <p class=\"lede\" style=\"margin-top:20px;max-width:520px;\">Depuis 1968, Hismar conçoit et fabrique la menuiserie des villas les plus exigeantes de Casablanca. Trois piliers fondent cette exigence.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"body-pad pillars\" style=\"margin-top:48px;\">\n    <div class=\"pillar\">\n      <span class=\"pnum\">01<\u002Fspan>\n      <h3>Héritage &amp; expertise depuis 1968<\u002Fh3>\n      <p>Près de six décennies d’engineering du bois au service de projets résidentiels d’exception.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillar\">\n      <span class=\"pnum\">02<\u002Fspan>\n      <h3>Ateliers industriels 1000&nbsp;m²<\u002Fh3>\n      <p>Machines de précision de dernière génération, pour une fabrication d’une régularité millimétrique.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillar\">\n      <span class=\"pnum\">03<\u002Fspan>\n      <h3>Matières premières européennes certifiées<\u002Fh3>\n      <p>Panneaux importés d’Europe, certifiés E1 — la traçabilité comme standard.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:52px;\">\n    <div class=\"stats\">\n      <div class=\"stat\"><div class=\"n\">58<\u002Fdiv><div class=\"l\">Ans d’expérience<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">+500<\u002Fdiv><div class=\"l\">Villas réalisées<\u002Fdiv><\u002Fdiv>\n      <div class=\"stat\"><div class=\"n\">1000&nbsp;m²<\u002Fdiv><div class=\"l\">Ateliers industriels<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:44px;\">\n    <div class=\"img-slot\" id=\"p2-photo\" style=\"width:100%;height:240px;\" data-placeholder=\"PHOTO — RÉALISATION INTÉRIEUR VILLA\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-foot\"><span>Hismar — Manufacture sur mesure<\u002Fspan><span>Casablanca<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 3 — ATELIERS & TECHNOLOGIE ════ -->\n<section class=\"page\" data-screen-label=\"03 Ateliers et technologie\" id=\"ateliers\">\n  <div class=\"page-head\"><span class=\"logo-sm\">HISMAR<\u002Fspan><span class=\"meta\">03 — Ateliers &amp; technologie<\u002Fspan><\u002Fdiv>\n  <div class=\"body-pad\" style=\"padding-top:54px;\">\n    <span class=\"eyebrow\">Nos ateliers &amp; technologie<\u002Fspan>\n    <h2 style=\"margin-top:16px;max-width:580px;\">La précision industrielle au service de votre villa<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:28px;display:grid;grid-template-columns:1fr 240px;gap:36px;align-items:start;\">\n    <div>\n      <p class=\"lede\">Hismar dispose d’ateliers industriels haute performance équipés de machines de dernière génération. Chaque pièce y est fabriquée avec une précision millimétrique impossible à atteindre manuellement.<\u002Fp>\n      <div class=\"machines\" style=\"margin-top:26px;\">\n        <div class=\"machine\"><span class=\"mnum\">M—01<\u002Fspan><span class=\"mname\">Presse hydraulique<\u002Fspan><\u002Fdiv>\n        <div class=\"machine\"><span class=\"mnum\">M—02<\u002Fspan><span class=\"mname\">Scie à panneaux de précision millimétrique<\u002Fspan><\u002Fdiv>\n        <div class=\"machine\"><span class=\"mnum\">M—03<\u002Fspan><span class=\"mname\">Bande de chant automatique<\u002Fspan><\u002Fdiv>\n        <div class=\"machine\"><span class=\"mnum\">M—04<\u002Fspan><span class=\"mname\">Placage de précision <em>machines italiennes<\u002Fem><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"img-slot\" id=\"p3-machine\" style=\"width:100%;height:300px;\" data-placeholder=\"PHOTO — MACHINE / ATELIER\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:38px;\">\n    <div class=\"goldbox\">\n      <div class=\"mark\">m²<\u002Fdiv>\n      <div>\n        <div class=\"gtxt\">1000&nbsp;m² d’ateliers industriels à Casablanca<\u002Fdiv>\n        <div class=\"gsub\">Un processus de production intégré, de la découpe numérique au contrôle qualité final.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:36px;\">\n    <div class=\"img-slot\" id=\"p3-atelier\" style=\"width:100%;height:240px;\" data-placeholder=\"PHOTO — VUE D'ENSEMBLE DES ATELIERS\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-foot\"><span>Engineering du bois<\u002Fspan><span>Précision millimétrique<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 4 — MATIÈRES PREMIÈRES ════ -->\n<section class=\"page cream\" data-screen-label=\"04 Matières premières\" id=\"matieres\">\n  <div class=\"page-head\"><span class=\"logo-sm\">HISMAR<\u002Fspan><span class=\"meta\">04 — Matières premières<\u002Fspan><\u002Fdiv>\n  <div class=\"body-pad\" style=\"padding-top:54px;\">\n    <span class=\"eyebrow\">Nos matières premières<\u002Fspan>\n    <h2 style=\"margin-top:16px;max-width:580px;\">Des matériaux certifiés, importés d’Europe<\u002Fh2>\n    <p class=\"lede\" style=\"margin-top:20px;max-width:540px;\">Chaque projet commence par l’excellence des matières premières. Nos panneaux MDF sont importés d’Europe, conformes à la norme E1.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:34px;\">\n    <div class=\"goldbox\">\n      <div class=\"mark\">E1<\u002Fdiv>\n      <div>\n        <div class=\"gtxt\">Certificats de conformité disponibles sur demande<\u002Fdiv>\n        <div class=\"gsub\">La transparence au cœur de nos engagements : les certificats de conformité de nos fabricants européens sont consultables à tout moment.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"body-pad hw-grid\" style=\"margin-top:46px;\">\n    <div>\n      <span class=\"eyebrow\">Quincaillerie<\u002Fspan>\n      <div class=\"hw-brand\">Blum &amp; Hettich<br><span style=\"font-size:15px;font-style:italic;color:var(--ink-light);\">référence mondiale<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <ul class=\"hw-list\">\n      <li>Fermetures silencieuses sur l’ensemble des ouvrants<\u002Fli>\n      <li>Garantie 10 ans sur la quincaillerie<\u002Fli>\n      <li>Mécanismes éprouvés sur des millions de cycles<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:48px;\">\n    <span class=\"eyebrow\" style=\"display:block;margin-bottom:14px;\">Certificats &amp; labels<\u002Fspan>\n    <div class=\"cert-slots\">\n      <div class=\"img-slot\" id=\"p4-cert-1\" style=\"width:100%;height:130px;\" data-placeholder=\"LOGO CERTIFICAT\"><\u002Fdiv>\n      <div class=\"img-slot\" id=\"p4-cert-2\" style=\"width:100%;height:130px;\" data-placeholder=\"LOGO CERTIFICAT\"><\u002Fdiv>\n      <div class=\"img-slot\" id=\"p4-cert-3\" style=\"width:100%;height:130px;\" data-placeholder=\"LOGO CERTIFICAT\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-foot\"><span>Matériaux certifiés E1<\u002Fspan><span>Importés d’Europe<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 5 — RÉALISATIONS ════ -->\n<section class=\"page\" data-screen-label=\"05 Réalisations\">\n  <div class=\"page-head\"><span class=\"logo-sm\">HISMAR<\u002Fspan><span class=\"meta\">05 — Réalisations<\u002Fspan><\u002Fdiv>\n  <div class=\"body-pad\" style=\"padding-top:54px;\">\n    <span class=\"eyebrow\">Nos réalisations par service<\u002Fspan>\n    <h2 style=\"margin-top:16px;\">Quatre expertises, une même précision<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"body-pad services\" style=\"margin-top:38px;\">\n    <div class=\"service\">\n      <div class=\"img-slot\" id=\"p5-s1\" style=\"width: 100%; height: 260px\" data-placeholder=\"PHOTO — PORTE PIVOT / ENTRÉE\"><\u002Fdiv>\n      <span class=\"snum\">S—01<\u002Fspan>\n      <h3>Portes d’entrée sur mesure<\u002Fh3>\n      <p>Portes pivot monumentales, portes invisibles flush, intégration architecturale parfaite. Précision millimétrique.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"service\">\n      <div class=\"img-slot\" id=\"p5-s2\" style=\"width: 100%; height: 260px\" data-placeholder=\"PHOTO — PORTES INTÉRIEURES\"><\u002Fdiv>\n      <span class=\"snum\">S—02<\u002Fspan>\n      <h3>Portes intérieures<\u002Fh3>\n      <p>Harmonie et cohérence entre chaque espace. Dimensions libres, finitions irréprochables.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"service\">\n      <div class=\"img-slot\" id=\"p5-s3\" style=\"width: 100%; height: 260px\" data-placeholder=\"PHOTO — PLACARD / DRESSING\"><\u002Fdiv>\n      <span class=\"snum\">S—03<\u002Fspan>\n      <h3>Placards &amp; dressings<\u002Fh3>\n      <p>Système modulaire haute précision, optimisé pour chaque configuration d’espace.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"service\">\n      <div class=\"img-slot\" id=\"p5-s4\" style=\"width: 100%; height: 260px\" data-placeholder=\"PHOTO — CUISINE SUR MESURE\"><\u002Fdiv>\n      <span class=\"snum\">S—04<\u002Fspan>\n      <h3>Cuisines sur mesure<\u002Fh3>\n      <p>De la conception 3D à l’installation finale. Chaque composant fabriqué dans nos ateliers.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-foot\"><span>Villas d’exception<\u002Fspan><span>Casablanca · Dar Bouazza · Bouskoura · Ain Diab<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 5A-1 — PORTES D'ENTRÉE (1/2) ════ -->\n<section class=\"page night\" data-screen-label=\"05A Portes d'entrée 1/2\" id=\"entree\">\n  <div class=\"page-head\" style=\"padding-top:44px;\">\n    <span class=\"logo- 230px;\" data-placeholder=\"PHOTO — CONCEPTION 3D OU POSE SUR CHANTIER\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-foot\"><span>Processus de production intégré<\u002Fspan><span>Casablanca<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 7 — CERTIFICATIONS ════ -->\n<section class=\"page\" data-screen-label=\"07 Certifications\" id=\"certifications\">\n  <div class=\"page-head\"><span class=\"logo-sm\">HISMAR<\u002Fspan><span class=\"meta\">07 — Certifications &amp; engagements<\u002Fspan><\u002Fdiv>\n  <div class=\"body-pad\" style=\"padding-top:54px;\">\n    <span class=\"eyebrow\">Certifications &amp; engagements<\u002Fspan>\n    <h2 style=\"margin-top:16px;max-width:600px;\">Des standards européens pour votre intérieur<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"body-pad certs\" style=\"margin-top:40px;\">\n    <div class=\"cert\">\n      <div class=\"cert-check\">✓<\u002Fdiv>\n      <div>\n        <h3>MDF mélaminé certifié E1<\u002Fh3>\n        <p>Importé d’Europe avec ses certificats de conformité — qualité de l’air intérieur et durabilité garanties.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cert\">\n      <div class=\"cert-check\">✓<\u002Fdiv>\n      <div>\n        <h3>Quincaillerie Blum &amp; Hettich<\u002Fh3>\n        <p>Référence mondiale, garantie 10 ans. Fermetures silencieuses sur l’ensemble des ouvrants.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cert\">\n      <div class=\"cert-check\">✓<\u002Fdiv>\n      <div>\n        <h3>Défaut de fabrication constaté après livraison ?<\u002Fh3>\n        <p>Hismar intervient. Gratuitement.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:36px;\">\n    <p class=\"cert-note\">«&nbsp;Tous nos certificats matière première sont transmis à la livraison.&nbsp;»<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"body-pad\" style=\"margin-top:36px;\">\n    <span class=\"eyebrow\" style=\"display:block;margin-bottom:14px;\">Visuels certificats<\u002Fspan>\n    <div class=\"cert-slots\">\n      <div class=\"img-slot\" id=\"p7-cert-1\" style=\"width:100%;height:160px;\" data-placeholder=\"VISUEL CERTIFICAT\"><\u002Fdiv>\n      <div class=\"img-slot\" id=\"p7-cert-2\" style=\"width:100%;height:160px;\" data-placeholder=\"VISUEL CERTIFICAT\"><\u002Fdiv>\n      <div class=\"img-slot\" id=\"p7-cert-3\" style=\"width:100%;height:160px;\" data-placeholder=\"VISUEL CERTIFICAT\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"page-foot\"><span>Standards européens<\u002Fspan><span>Garantie 10 ans quincaillerie<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════ PAGE 8 — CONTACT ════ -->\n<section class=\"page night\" id=\"contact\" data-screen-label=\"08 Contact\">\n  <div class=\"page-head\" style=\"padding-top:44px;\">\n    <span class=\"logo-sm\" style=\"color:var(--cream);\">HISMAR<\u002Fspan>\n    <a href=\"tel:+212662177069\" style=\"font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--gold-light);text-decoration:none;\">+212 662 177 069<\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"body-pad\" style=\"padding-top:24px;\">\n    <span class=\"eyebrow\">Votre projet commence ici<\u002Fspan>\n    <h2 style=\"margin-top:10px;color:var(--cream);font-size:36px;max-width:500px;\">Commençons votre projet<\u002Fh2>\n    <p style=\"margin-top:10px;font-size:13px;line-height:1.7;color:rgba(249,248,246,.65);max-width:460px;\">Notre équipe vous contacte sous 24h pour votre consultation 3D gratuite.<\u002Fp>\n  <\u002Fdiv>\n\n  <form class=\"form-section\" id=\"hismar-form\" style=\"margin-top:22px;\" onsubmit=\"hismarSubmit(event)\">\n    <div class=\"form-row\">\n      <div class=\"form-field\">\n        <label for=\"f-prenom\">Prénom<\u002Flabel>\n        <input type=\"text\" id=\"f-prenom\" placeholder=\"Votre prénom\">\n      <\u002Fdiv>\n      <div class=\"form-field\">\n        <label for=\"f-nom\">Nom<\u002Flabel>\n        <input type=\"text\" id=\"f-nom\" placeholder=\"Votre nom\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row full\">\n      <div class=\"form-field\">\n        <label for=\"f-tel\">Téléphone<\u002Flabel>\n        <input type=\"tel\" id=\"f-tel\" placeholder=\"+212 6XX XXX XXX\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row full\">\n      <div class=\"form-field\">\n        <label>État du projet<\u002Flabel>\n        <div class=\"radio-group\">\n          <input type=\"radio\" name=\"etat\" id=\"e-neuf\" value=\"Nouvelle construction\">\n          <label for=\"e-neuf\">Nouvelle construction<\u002Flabel>\n          <input type=\"radio\" name=\"etat\" id=\"e-reno\" value=\"Rénovation\">\n          <label for=\"e-reno\">Rénovation<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row full\">\n      <div class=\"form-field\">\n        <label>Type de construction<\u002Flabel>\n        <div class=\"radio-group\">\n          <input type=\"radio\" name=\"type\" id=\"t-villa\" value=\"Villa\">\n          <label for=\"t-villa\">Villa<\u002Flabel>\n          <input type=\"radio\" name=\"type\" id=\"t-imm\" value=\"Immeuble\">\n          <label for=\"t-imm\">Immeuble<\u002Flabel>\n          <input type=\"radio\" name=\"type\" id=\"t-apt\" value=\"Appartement\">\n          <label for=\"t-apt\">Appartement<\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row full\">\n      <div class=\"form-field\">\n        <label for=\"f-msg\">Description<\u002Flabel>\n        <textarea id=\"f-msg\" rows=\"4\" placeholder=\"Décrivez votre projet...\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button type=\"submit\" class=\"btn-submit\">Envoyer via WhatsApp →<\u002Fbutton>\n  <\u002Fform>\n\n  <div class=\"contact-foot\" style=\"margin-top:auto;text-align:center;padding-bottom:32px;\">\n    <div class=\"mono\" style=\"color:rgba(249,248,246,.3);margin-bottom:8px;\">HISMAR — EST. 1968<\u002Fdiv>\n    <div style=\"font-family:var(--serif);font-style:italic;font-size:13px;color:rgba(249,248,246,.35);\">1968. Le bois élevé au rang d’art.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fdiv>\n\n<script>\n/* ── Image slot + panneau de contrôle ── tout inline, zéro fetch ── */\ntry {\n  /* Defer ALL init until after first paint */\n  setTimeout(function() {\n\n    var LS_IMG  = function(id){ return 'hismar_img_' + id; };\n    var LS_PREF = function(id){ return 'hismar_pref_' + id; };\n\n    function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }\n    function lsSet(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }\n\n    var GRID = [\n      ['\\u2196','0% 0%'],   ['\\u2191','50% 0%'],   ['\\u2197','100% 0%'],\n      ['\\u2190','0% 50%'],  ['\\u25cf','50% 50%'],  ['\\u2192','100% 50%'],\n      ['\\u2199','0% 100%'], ['\\u2193','50% 100%'], ['\\u2198','100% 100%'],\n    ];\n\n    /* ── Build placeholder UI for each .img-slot ── */\n    function buildSlot(el, slotIndex) {\n      if (el._slotReady) return;\n      el._slotReady = true;\n\n      el.style.position   = 'relative';\n      el.style.overflow   = 'hidden';\n      el.style.cursor     = 'pointer';\n      el.style.userSelect = 'none';\n\n      /* placeholder overlay */\n      var ph = document.createElement('div');\n      ph.style.cssText = [\n        'position:absolute;inset:0',\n        'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px',\n        'background:#EDE7DD;color:#9C8472',\n        \"font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.18em\",\n        'text-transform:uppercase;text-align:center;padding:16px;pointer-events:none'\n      ].join(';');\n\n      var arrow = document.createElement('div');\n      arrow.innerHTML = '<svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#A8834A\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 16 12 12 8 16\"/><line x1=\"12\" y1=\"12\" x2=\"12\" y2=\"21\"/><path d=\"M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3\"/><\u002Fsvg>';\n\n      var txt = document.createElement('span');\n      txt.textContent = el.dataset.placeholder || 'Déposer une image';\n\n      ph.appendChild(arrow);\n      ph.appendChild(txt);\n      el.appendChild(ph);\n      el._ph = ph;\n\n      /* image */\n      var img = document.createElement('img');\n      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 50%;display:none;pointer-events:none;';\n      el.appendChild(img);\n      el._img = img;\n\n      /* restore from localStorage — staggered to never block initial render */\n      (function(capturedEl, idx){\n        setTimeout(function(){\n          var stored = lsGet(LS_IMG(capturedEl.id));\n          if (stored && stored.src) {\n            if (stored.src.length > 2000000) {\n              try { localStorage.removeItem(LS_IMG(capturedEl.id)); } catch(e){}\n            } else {\n              showImage(capturedEl, stored.src);\n            }\n          }\n        }, 500 + (idx || 0) * 30);\n      })(el, slotIndex);\n\n      /* drag & drop */\n      el.addEventListener('dragover', function(e){ e.preventDefault(); el.style.opacity='0.7'; });\n      el.addEventListener('dragleave', function(){ el.style.opacity=''; });\n      el.addEventListener('drop', function(e){\n        e.preventDefault(); el.style.opacity='';\n        var f = e.dataTransfer.files[0];\n        if (f && f.type.indexOf('image/')===0) loadFile(el, f);\n      });\n\n      /* click to pick */\n      el.addEventListener('click', function(){\n        var inp = document.createElement('input');\n        inp.type='file'; inp.accept='image/*';\n        inp.onchange = function(){ if(inp.files[0]) loadFile(el, inp.files[0]); };\n        inp.click();\n      });\n\n      /* hover → show panel */\n      el.addEventListener('mouseenter', function(){\n        if (!el.dataset.filled) return;\n        stopHide();\n        activeSlot = el;\n        renderPanel();\n        anchorPanel(el);\n      });\n      el.addEventListener('mouseleave', startHide);\n    }\n\n    function loadFile(el, file){\n      var reader = new FileReader();\n      reader.onload = function(e){\n        /* Compress before storing to avoid localStorage quota errors */\n        var img = new Image();\n        img.onload = function(){\n          var MAX = 1400;\n          var w = img.width, h = img.height;\n          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }\n          if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }\n          var canvas = document.createElement('canvas');\n          canvas.width = w; canvas.height = h;\n          canvas.getContext('2d').drawImage(img, 0, 0, w, h);\n          var compressed = canvas.toDataURL('image/jpeg', 0.82);\n          try {\n            lsSet(LS_IMG(el.id), { src: compressed });\n          } catch(qe) {\n            console.warn('Hismar: localStorage plein, photo non sauvegardée.');\n          }\n          showImage(el, compressed);\n        };\n        img.src = e.target.result;\n      };\n      reader.readAsDataURL(file);\n    }\n\n    function showImage(el, src){\n      el._img.src = src;\n      el._img.style.display = 'block';\n      el._ph.style.display  = 'none';\n      el.dataset.filled = '1';\n      applyPrefs(el);\n    }\n\n    function applyPrefs(el){\n      var p   = lsGet(LS_PREF(el.id)) || {};\n      var fit = p.fit || 'cover';\n      var pos = p.pos || '50% 50%';\n      el._img.style.objectFit      = fit;\n      el._img.style.objectPosition = pos;\n    }\n\n    /* ── Floating control panel ── */\n    var panel = document.createElement('div');\n    panel.style.cssText = [\n      'position:fixed;z-index:99999;display:none;flex-direction:column;gap:10px',\n      'background:rgba(28,20,16,0.97);border:1px solid rgba(168,131,74,0.45)',\n      'padding:14px 16px;min-width:206px;border-radius:2px',\n      \"font:normal 9px/1 'Courier New',monospace;letter-spacing:.16em\",\n      'color:rgba(249,248,246,.85);box-shadow:0 14px 44px rgba(0,0,0,.7)',\n      'pointer-events:auto'\n    ].join(';');\n    document.body.appendChild(panel);\n\n    var activeSlot = null, hideTimer = null;\n    function stopHide(){ clearTimeout(hideTimer); }\n    function startHide(){ hideTimer = setTimeout(function(){ panel.style.display='none'; activeSlot=null; }, 280); }\n    panel.addEventListener('mouseenter', stopHide);\n    panel.addEventListener('mouseleave', startHide);\n\n    function anchorPanel(el){\n      panel.style.display = 'flex';\n      requestAnimationFrame(function(){\n        var r  = el.getBoundingClientRect();\n        var ph = panel.offsetHeight, pw = panel.offsetWidth;\n        var top  = r.top - ph - 12;\n        if (top < 8) top = r.bottom + 12;\n        var left = r.left + r.width/2 - pw/2;\n        left = Math.max(8, Math.min(window.innerWidth - pw - 8, left));\n        panel.style.top  = top  + 'px';\n        panel.style.left = left + 'px';\n      });\n    }\n\n    function renderPanel(){\n      if (!activeSlot) return;\n      var s   = activeSlot;\n      var p   = lsGet(LS_PREF(s.id)) || {};\n      var fit = p.fit || 'cover';\n      var pos = p.pos || '50% 50%';\n      panel.innerHTML = '';\n\n      function lbl(t){\n        var e = document.createElement('span');\n        e.textContent = t;\n        e.style.cssText = 'color:rgba(168,131,74,.6);font-size:8px;letter-spacing:.28em';\n        return e;\n      }\n      function mkBtn(t, active, fn){\n        var b = document.createElement('button');\n        b.textContent = t;\n        b.style.cssText = [\n          'cursor:pointer;border-radius:2px;font:normal 9px/1 inherit;letter-spacing:.12em;padding:5px 11px',\n          active\n            ? 'background:rgba(168,131,74,.18);border:1px solid #A8834A;color:#C9A86A'\n            : 'background:transparent;border:1px solid rgba(255,255,255,.13);color:rgba(249,248,2
